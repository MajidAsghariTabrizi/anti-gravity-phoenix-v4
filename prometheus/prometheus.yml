global:
  scrape_interval: 5s

scrape_configs:
  - job_name: feed-ingestor
    static_configs:
      - targets: ["feed-ingestor:9100"]
  - job_name: rpc-gateway
    static_configs:
      - targets: ["rpc-gateway:9300"]
  - job_name: phoenix-engine
    static_configs:
      - targets: ["phoenix-engine:9200"]
  - job_name: recorder
    static_configs:
      - targets: ["recorder:9400"]

global:
  scrape_interval: 5s
  scrape_timeout: 3s

scrape_configs:
  - job_name: feed-ingestor
    sample_limit: 2048
    label_limit: 8
    label_name_length_limit: 64
    label_value_length_limit: 128
    static_configs:
      - targets: ["feed-ingestor:9100"]
  - job_name: rpc-gateway
    sample_limit: 2048
    label_limit: 8
    label_name_length_limit: 64
    label_value_length_limit: 128
    static_configs:
      - targets: ["rpc-gateway:9300"]
  - job_name: phoenix-engine
    sample_limit: 2048
    label_limit: 8
    label_name_length_limit: 64
    label_value_length_limit: 128
    static_configs:
      - targets: ["phoenix-engine:9200"]
  - job_name: recorder
    sample_limit: 2048
    label_limit: 8
    label_name_length_limit: 64
    label_value_length_limit: 128
    static_configs:
      - targets: ["recorder:9400"]
  - job_name: shadow-dispatcher
    sample_limit: 2048
    label_limit: 8
    label_name_length_limit: 64
    label_value_length_limit: 128
    static_configs:
      - targets: ["shadow-dispatcher:9500"]

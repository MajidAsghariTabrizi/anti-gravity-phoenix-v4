name: Phoenix CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.head.ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  hygiene:
    name: hygiene
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Run secret scans
        shell: bash
        run: |
          set -euo pipefail
          pwsh -NoProfile -ExecutionPolicy Bypass -File ./scripts/secret-scan.ps1
          sh ./scripts/secret-scan.sh

      - name: Run forbidden file checks
        shell: bash
        run: |
          set -euo pipefail
          pwsh -NoProfile -ExecutionPolicy Bypass -File ./scripts/forbidden-file-check.ps1
          sh ./scripts/forbidden-file-check.sh

      - name: Validate shell syntax
        shell: bash
        run: |
          set -euo pipefail
          sh -n scripts/*.sh

      - name: Validate bounded Engine canary control
        shell: bash
        run: |
          set -euo pipefail
          sh ./scripts/shadow-engine-canary-control-tests.sh
          sh ./scripts/shadow-engine-isolated-canary-tests.sh
          sh ./scripts/shadow-positive-route-evidence-tests.sh
          sh ./scripts/production-compose-context-tests.sh
          python3 -m py_compile scripts/shadow_profitability_report.py
          sh ./scripts/shadow-profitability-report-tests.sh
          python3 -m py_compile scripts/shadow_route_discovery.py
          sh ./scripts/shadow-route-discovery-tests.sh
          python3 -m py_compile scripts/prelive_money_path_report.py
          sh ./scripts/prelive-money-path-report-tests.sh
          python3 -m py_compile scripts/prelive_dashboard_snapshot.py scripts/verify_dashboard_compose.py
          python3 -m py_compile scripts/prelive_shadow_control.py scripts/prelive_dashboard_live.py
          sh ./scripts/prelive-shadow-control-tests.sh
          python3 -m py_compile scripts/release_assets.py
          python3 -m unittest scripts.tests.test_release_assets
          sh ./scripts/prelive-release-gate-tests.sh
          python3 -m py_compile scripts/prelive_protected_maintenance.py
          python3 -m unittest scripts.tests.test_prelive_protected_maintenance
          sh ./scripts/prelive-protected-maintenance-tests.sh
          sh ./scripts/prelive-protected-maintenance-supervisor-tests.sh
          sh ./scripts/production-bootstrap-safety-tests.sh

      - name: Validate tracked hygiene
        shell: bash
        run: |
          set -euo pipefail
          git diff --check
          if git ls-files --error-unmatch .env >/dev/null 2>&1; then
            echo ".env is tracked and must be removed from Git"
            exit 1
          fi
          bad_private="$(git ls-files | grep -Ei '(^|/)(keystore|keystores|wallets)(/|$)|\.(pem|key|pfx|p12|jks|keystore)$|UTC--|wallet.*\.(json|txt|wallet)$' || true)"
          bad_runtime="$(git ls-files | grep -Ei '(^|/)(postgres-data|postgres_data|pgdata|prometheus-data|prometheus_data|recordings|feed-recordings|replay-output|benchmark-output|bench-output|target|out|cache|broadcast|node_modules)(/|$)|\.(db|sqlite|sqlite3|db-wal|db-shm|ndjson\.zst|jsonl\.zst|prof|pprof|bench)$' || true)"
          if [ -n "$bad_private" ]; then
            echo "Private key or wallet-like files are tracked:"
            echo "$bad_private"
            exit 1
          fi
          if [ -n "$bad_runtime" ]; then
            echo "Runtime, recording, or build output files are tracked:"
            echo "$bad_runtime"
            exit 1
          fi

  go:
    name: go
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff
        with:
          go-version-file: feed-ingestor/go.mod
          cache: true
          cache-dependency-path: |
            feed-ingestor/go.mod
            migration-runner/go.sum

      - name: Verify feed-ingestor
        shell: bash
        run: |
          set -euo pipefail
          cd feed-ingestor
          files="$(gofmt -l .)"
          if [ -n "$files" ]; then
            echo "gofmt required for:"
            echo "$files"
            exit 1
          fi
          go vet ./...
          go test ./...

      - name: Verify migration-runner
        shell: bash
        run: |
          set -euo pipefail
          cd migration-runner
          files="$(gofmt -l .)"
          if [ -n "$files" ]; then
            echo "gofmt required for:"
            echo "$files"
            exit 1
          fi
          go vet ./...
          go test ./...

  rust-phoenix:
    name: rust-phoenix
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    services:
      postgres:
        image: postgres@sha256:57c72fd2a128e416c7fcc499958864df5301e940bca0a56f58fddf30ffc07777
        env:
          POSTGRES_USER: phoenix_test
          POSTGRES_PASSWORD: phoenix_test_password
          POSTGRES_DB: phoenix_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U phoenix_test -d phoenix_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Install Rust components
        shell: bash
        run: rustup toolchain install stable --profile minimal --component rustfmt,clippy
      - name: Verify phoenix-engine
        shell: bash
        run: |
          set -euo pipefail
          cargo fmt --check --manifest-path phoenix-engine/Cargo.toml
          cargo clippy --manifest-path phoenix-engine/Cargo.toml --all-targets --all-features -- -D warnings
          cargo test --manifest-path phoenix-engine/Cargo.toml
          PHOENIX_TEST_POSTGRES_DSN=postgres://phoenix_test:phoenix_test_password@127.0.0.1:5432/phoenix_test \
            cargo test --locked --manifest-path phoenix-engine/Cargo.toml \
              --test postgres_decision_integration -- --nocapture
          docker run --rm --network host \
            -e PGPASSWORD=phoenix_test_password \
            postgres@sha256:57c72fd2a128e416c7fcc499958864df5301e940bca0a56f58fddf30ffc07777 \
            psql -X -qAt -v ON_ERROR_STOP=1 \
              -h 127.0.0.1 -U phoenix_test -d phoenix_test \
              -c "INSERT INTO schema_migrations(version, checksum) VALUES ('010_fork_simulation_evidence', repeat('a', 64)) ON CONFLICT (version) DO UPDATE SET checksum = EXCLUDED.checksum" \
            >/dev/null
          docker run --rm --network host \
            -e PGPASSWORD=phoenix_test_password \
            -v "$PWD/scripts/sql:/sql:ro" \
            postgres@sha256:57c72fd2a128e416c7fcc499958864df5301e940bca0a56f58fddf30ffc07777 \
            psql -X -qAt -v ON_ERROR_STOP=1 \
              -v window_hours=24 \
              -v route_hash=aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa \
              -v evidence_start=1970-01-01T00:00:00Z \
              -h 127.0.0.1 -U phoenix_test -d phoenix_test \
              -f /sql/prelive-dashboard-source.sql \
            > /tmp/prelive-dashboard-source.json
          python3 scripts/prelive_dashboard_live.py validate-source \
            --input /tmp/prelive-dashboard-source.json

  rust-rpc-gateway:
    name: rust-rpc-gateway
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Install Rust components
        shell: bash
        run: rustup toolchain install stable --profile minimal --component rustfmt,clippy
      - name: Verify rpc-gateway
        shell: bash
        run: |
          set -euo pipefail
          cargo fmt --check --manifest-path rpc-gateway/Cargo.toml
          cargo clippy --manifest-path rpc-gateway/Cargo.toml --all-targets --all-features -- -D warnings
          cargo test --manifest-path rpc-gateway/Cargo.toml

  rust-recorder:
    name: rust-recorder
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    services:
      postgres:
        image: postgres@sha256:57c72fd2a128e416c7fcc499958864df5301e940bca0a56f58fddf30ffc07777
        env:
          POSTGRES_USER: phoenix_test
          POSTGRES_PASSWORD: phoenix_test_password
          POSTGRES_DB: phoenix_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U phoenix_test -d phoenix_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Install Rust components
        shell: bash
        run: rustup toolchain install stable --profile minimal --component rustfmt,clippy
      - name: Verify recorder
        shell: bash
        run: |
          set -euo pipefail
          cargo fmt --check --manifest-path recorder/Cargo.toml
          cargo clippy --manifest-path recorder/Cargo.toml --all-targets --all-features -- -D warnings
          cargo test --manifest-path recorder/Cargo.toml
          PHOENIX_TEST_POSTGRES_DSN=postgres://phoenix_test:phoenix_test_password@127.0.0.1:5432/phoenix_test \
            cargo test --locked --manifest-path recorder/Cargo.toml \
              --test postgres_outbox_integration -- --nocapture

  rust-replay:
    name: rust-replay
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Install Rust components
        shell: bash
        run: rustup toolchain install stable --profile minimal --component rustfmt,clippy
      - name: Verify replay
        shell: bash
        run: |
          set -euo pipefail
          cargo fmt --check --manifest-path replay/Cargo.toml
          cargo clippy --manifest-path replay/Cargo.toml --all-targets --all-features -- -D warnings
          cargo test --manifest-path replay/Cargo.toml

  rust-fork-sandbox:
    name: rust-fork-sandbox
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    services:
      postgres:
        image: postgres@sha256:57c72fd2a128e416c7fcc499958864df5301e940bca0a56f58fddf30ffc07777
        env:
          POSTGRES_USER: phoenix_fork_test
          POSTGRES_PASSWORD: phoenix_fork_test_password
          POSTGRES_DB: phoenix_fork_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U phoenix_fork_test -d phoenix_fork_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Install Rust components
        shell: bash
        run: rustup toolchain install stable --profile minimal --component rustfmt,clippy
      - name: Verify isolated fork sandbox
        shell: bash
        env:
          PHOENIX_TEST_POSTGRES_DSN: postgres://phoenix_fork_test:phoenix_fork_test_password@127.0.0.1:5432/phoenix_fork_test
        run: |
          set -euo pipefail
          cargo fmt --check --manifest-path fork-sandbox/Cargo.toml
          cargo clippy --locked --manifest-path fork-sandbox/Cargo.toml --all-targets --all-features -- -D warnings
          cargo test --locked --manifest-path fork-sandbox/Cargo.toml -- --nocapture
          sh ./scripts/fork-sandbox-validate.sh

  solidity:
    name: solidity
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@b00af27efadbc7b4ca8b82abbd903b17cc874d2a
        with:
          version: stable
      - name: Verify contracts
        shell: bash
        run: |
          set -euo pipefail
          cd contracts
          forge fmt --check
          forge test

  python-dashboard:
    name: python-dashboard
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: dashboard/requirements.txt
      - name: Verify dashboard
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -r dashboard/requirements.txt
          python -m py_compile dashboard/app.py dashboard/snapshot_model.py scripts/prelive_dashboard_snapshot.py scripts/prelive_dashboard_live.py scripts/prelive_shadow_control.py scripts/verify_dashboard_compose.py
          python -m unittest discover -s dashboard/tests -p 'test_*.py' -v
          python -m unittest scripts.tests.test_prelive_dashboard_live scripts.tests.test_prelive_shadow_control -v
          python scripts/prelive_dashboard_snapshot.py \
            --input fixtures/dashboard/latest-dashboard.json \
            --output fixtures/dashboard/checked-dashboard.json \
            --check
          python dashboard/smoke_import.py

  docker-validation:
    name: docker-validation
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f
      - name: Validate Compose files
        shell: bash
        run: |
          set -euo pipefail
          cat > .ci-prod.env <<'EOF'
          PHOENIX_ENV=production
          PHOENIX_MODE=SHADOW
          LIVE_EXECUTION=false
          CHAIN_ID=42161
          POSTGRES_USER=phoenix_app
          POSTGRES_PASSWORD=ci-placeholder-not-production
          POSTGRES_DB=phoenix
          POSTGRES_DSN=postgres://phoenix_app:ci-placeholder-not-production@postgres:5432/phoenix
          NATS_URL=nats://nats:4222
          PHOENIX_FEED_SOURCE=relay
          PHOENIX_FEED_RELAY_URL=ws://nitro-feed-relay:9642/feed
          PARENT_CHAIN_RPC_URL=https://parent-chain-placeholder.invalid
          ARBITRUM_SEQUENCER_FEED_URL=wss://sequencer-feed-placeholder.invalid
          RPC_PROVIDER_URLS=https://rpc-placeholder.invalid
          RPC_PROVIDER_WEIGHTS=1
          RPC_UPSTREAM_CALLS_PER_SECOND=1
          RPC_UPSTREAM_CALL_BURST=4
          RPC_STATE_REQUESTS_PER_MINUTE=12
          RPC_PROVIDER_PROBE_INTERVAL_SECONDS=60
          ENGINE_ROUTER_ADDRESSES=0xe592427a0aece92de3edee1f18e0157c05861564,0x68b3465833fb72a70ecdf485e0e4c7bd8665fc45,0xa51afafe0263b40edaef0df8781ea9aa03e381a3
          SIGNER_PRIVATE_KEY=
          WALLET_ADDRESS=
          EXECUTOR_ADDRESS=
          FEED_INGESTOR_IMAGE=ghcr.io/majidasgharitabrizi/feed-ingestor@sha256:1111111111111111111111111111111111111111111111111111111111111111
          PHOENIX_ENGINE_IMAGE=ghcr.io/majidasgharitabrizi/phoenix-engine@sha256:2222222222222222222222222222222222222222222222222222222222222222
          RPC_GATEWAY_IMAGE=ghcr.io/majidasgharitabrizi/rpc-gateway@sha256:3333333333333333333333333333333333333333333333333333333333333333
          RECORDER_IMAGE=ghcr.io/majidasgharitabrizi/recorder@sha256:4444444444444444444444444444444444444444444444444444444444444444
          DASHBOARD_IMAGE=ghcr.io/majidasgharitabrizi/dashboard@sha256:5555555555555555555555555555555555555555555555555555555555555555
          EOF
          docker compose config
          PHOENIX_ENV_FILE=.ci-prod.env docker compose --env-file .ci-prod.env -f compose.prod.yml config
          PHOENIX_ENV_FILE=.ci-prod.env docker compose --env-file .ci-prod.env -f compose.prod.yml config --format json > .ci-prod-config.json
          python3 scripts/verify_dashboard_compose.py .ci-prod-config.json
          cat > .ci-fork.env <<'EOF'
          FORK_ANVIL_DIGEST=aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
          FORK_POSTGRES_PASSWORD=ci-fork-placeholder
          FORK_UPSTREAM_RPC_URL=https://fork-upstream-placeholder.invalid
          FORK_BLOCK_NUMBER=100
          FORK_SHADOW_DECISION_ID=11111111-1111-8111-8111-111111111111
          FORK_ALLOWED_TOKENS=0x1111111111111111111111111111111111111111,0x2222222222222222222222222222222222222222
          FORK_ALLOWED_POOLS=0x3333333333333333333333333333333333333333,0x4444444444444444444444444444444444444444
          FORK_ALLOWED_ROUTERS=0x5555555555555555555555555555555555555555
          FORK_ALLOWED_PROTOCOLS=UniswapV3,SushiSwapV3
          FORK_TARGET_CONTRACT=0x6666666666666666666666666666666666666666
          FORK_TARGET_CODE_HASH=ffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffff
          FORK_SIMULATION_FROM=0x7777777777777777777777777777777777777777
          FORK_MINIMUM_NET_PNL=1
          FORK_MAXIMUM_INPUT_AMOUNT=1000000
          FORK_SLIPPAGE_BPS=100
          FORK_MAXIMUM_CALLDATA_BYTES=65536
          EOF
          docker compose --env-file .ci-fork.env -f compose.fork.yml --profile fork-sandbox config
          printf 'ENGINE_ROUTE_REGISTRY_JSON=%s\n' "$(python3 -c 'import json; print(json.dumps(json.load(open("fixtures/routes/weth_usdc_uniswap_v3.json")), separators=(",", ":")))')" >> .ci-prod.env
          cat > .ci-release.env <<'EOF'
          FEED_INGESTOR_IMAGE=ghcr.io/majidasgharitabrizi/feed-ingestor@sha256:1111111111111111111111111111111111111111111111111111111111111111
          PHOENIX_ENGINE_IMAGE=ghcr.io/majidasgharitabrizi/phoenix-engine@sha256:2222222222222222222222222222222222222222222222222222222222222222
          RPC_GATEWAY_IMAGE=ghcr.io/majidasgharitabrizi/rpc-gateway@sha256:3333333333333333333333333333333333333333333333333333333333333333
          RECORDER_IMAGE=ghcr.io/majidasgharitabrizi/recorder@sha256:4444444444444444444444444444444444444444444444444444444444444444
          DASHBOARD_IMAGE=ghcr.io/majidasgharitabrizi/dashboard@sha256:5555555555555555555555555555555555555555555555555555555555555555
          PHOENIX_RELEASE_SHA=0000000000000000000000000000000000000000
          EOF
          ./scripts/render-production-compose.sh \
            --compose-file "$PWD/compose.prod.yml" \
            --env-file "$PWD/.ci-prod.env" \
            --release-env "$PWD/.ci-release.env" \
            --output "$PWD/.ci-rendered.json" \
            --metadata-output "$PWD/.ci-render-metadata.json" >/dev/null

      - name: Validate Compose route registry preservation
        shell: bash
        run: |
          set -euo pipefail
          sh ./scripts/compose-route-registry-tests.sh

      - name: Validate NATS JetStream configuration
        shell: bash
        run: |
          set -euo pipefail
          docker run --rm \
            -v "$PWD/deploy/nats-server.conf:/etc/nats/nats-server.conf:ro" \
            nats@sha256:b83efabe3e7def1e0a4a31ec6e078999bb17c80363f881df35edc70fcb6bb927 -t -c /etc/nats/nats-server.conf
      - name: Build Phoenix-owned Dockerfiles
        shell: bash
        run: |
          set -euo pipefail
          docker buildx build --load -f deploy/feed-ingestor.Dockerfile -t phoenix/feed-ingestor:ci .
          docker buildx build --load -f deploy/rust.Dockerfile --build-arg CRATE=phoenix-engine -t phoenix/phoenix-engine:ci .
          docker buildx build --load -f deploy/rust.Dockerfile --build-arg CRATE=rpc-gateway -t phoenix/rpc-gateway:ci .
          docker buildx build --load -f deploy/rust.Dockerfile --build-arg CRATE=recorder -t phoenix/recorder:ci .
          docker buildx build --load -f deploy/fork-sandbox.Dockerfile -t phoenix/fork-sandbox:ci .
          docker buildx build --load -f deploy/dashboard.Dockerfile -t phoenix/dashboard:ci .

  integration-fixtures:
    name: integration-fixtures
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Install Rust components
        shell: bash
        run: rustup toolchain install stable --profile minimal --component rustfmt,clippy
      - name: Run deterministic fixture checks
        shell: bash
        run: |
          set -euo pipefail
          cargo test --manifest-path phoenix-engine/Cargo.toml --test e2e_fixtures
          cargo test --manifest-path phoenix-engine/Cargo.toml --test positive_route_evidence
          cd feed-ingestor
          go test ./internal/decoder -run 'Fixture|Duplicate|Gap'

  jetstream-integration:
    name: jetstream-integration
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff
        with:
          go-version-file: feed-ingestor/go.mod
          cache: true
          cache-dependency-path: feed-ingestor/go.sum
      - name: Install Rust components
        shell: bash
        run: rustup toolchain install stable --profile minimal
      - name: Verify durable JetStream publication and consumption
        shell: bash
        run: |
          set -euo pipefail
          docker run --detach --name phoenix-ci-nats \
            --publish 127.0.0.1:4222:4222 \
            --volume "$PWD/deploy/nats-server.conf:/etc/nats/nats-server.conf:ro" \
            nats@sha256:b83efabe3e7def1e0a4a31ec6e078999bb17c80363f881df35edc70fcb6bb927 -c /etc/nats/nats-server.conf
          trap 'docker rm --force phoenix-ci-nats >/dev/null 2>&1 || true' EXIT

          for attempt in $(seq 1 30); do
            if docker exec phoenix-ci-nats wget -q -O - \
              'http://127.0.0.1:8222/healthz?js-enabled-only=true' >/dev/null; then
              break
            fi
            if [ "$attempt" -eq 30 ]; then
              docker logs --tail 100 phoenix-ci-nats
              exit 1
            fi
            sleep 1
          done

          (
            cd feed-ingestor
            PHOENIX_TEST_NATS_URL=nats://127.0.0.1:4222 \
              go test ./internal/publisher -run '^TestJetStreamPublisherIntegration$' -count=1 -v
          )
          PHOENIX_TEST_NATS_URL=nats://127.0.0.1:4222 \
            cargo test --locked --manifest-path recorder/Cargo.toml \
              --test jetstream_integration -- --nocapture
          PHOENIX_TEST_NATS_URL=nats://127.0.0.1:4222 \
            cargo test --locked --manifest-path recorder/Cargo.toml \
              --test engine_stream_integration -- --nocapture

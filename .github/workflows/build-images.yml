name: Build Phoenix Images

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: majidasgharitabrizi

jobs:
  build:
    name: build-${{ matrix.image }}
    runs-on: ubuntu-24.04
    timeout-minutes: 35
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: feed-ingestor
            dockerfile: deploy/feed-ingestor.Dockerfile
            build_args: ""
          - image: phoenix-engine
            dockerfile: deploy/rust.Dockerfile
            build_args: "CRATE=phoenix-engine"
          - image: rpc-gateway
            dockerfile: deploy/rust.Dockerfile
            build_args: "CRATE=rpc-gateway"
          - image: recorder
            dockerfile: deploy/rust.Dockerfile
            build_args: "CRATE=recorder"
          - image: fork-sandbox
            dockerfile: deploy/fork-sandbox.Dockerfile
            build_args: ""
          - image: dashboard
            dockerfile: deploy/dashboard.Dockerfile
            build_args: ""
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f

      - name: Login to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Capture OCI created timestamp
        id: created
        shell: bash
        run: echo "value=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_OUTPUT"

      - name: Build and push immutable image
        id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          build-args: ${{ matrix.build_args }}
          tags: ghcr.io/majidasgharitabrizi/${{ matrix.image }}:sha-${{ github.sha }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ steps.created.outputs.value }}
            org.opencontainers.image.title=${{ matrix.image }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}

      - name: Write image manifest fragment
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p manifest-fragments
          cat > "manifest-fragments/${{ matrix.image }}.json" <<EOF
          {
            "name": "${{ matrix.image }}",
            "repository": "ghcr.io/majidasgharitabrizi/${{ matrix.image }}",
            "tag": "sha-${{ github.sha }}",
            "digest": "${{ steps.build.outputs.digest }}"
          }
          EOF

      - name: Upload image manifest fragment
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: release-fragment-${{ matrix.image }}
          path: manifest-fragments/${{ matrix.image }}.json
          if-no-files-found: error
          retention-days: 30

  assets:
    name: release-assets
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@b00af27efadbc7b4ca8b82abbd903b17cc874d2a
        with:
          version: stable

      - name: Build and verify immutable release assets
        shell: bash
        run: |
          set -euo pipefail
          forge build --root contracts
          python3 -m unittest scripts.tests.test_release_assets
          python3 scripts/release_assets.py build \
            --repo-root . \
            --release-sha "$GITHUB_SHA" \
            --contract-artifact contracts/out/PhoenixExecutor.sol/PhoenixExecutor.json \
            --output-dir release-assets
          python3 scripts/release_assets.py verify \
            --archive "release-assets/phoenix-release-assets-${GITHUB_SHA}.tar.gz" \
            --manifest release-assets/release-assets-manifest.json \
            --checksums release-assets/release-assets-checksums.txt \
            --expected-sha "$GITHUB_SHA"

      - name: Upload immutable release assets
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: phoenix-release-assets-${{ github.sha }}
          path: release-assets/
          if-no-files-found: error
          retention-days: 90

  manifest:
    name: release-manifest
    needs: [build, assets]
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Download image manifest fragments
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          pattern: release-fragment-*
          merge-multiple: true
          path: manifest-fragments

      - name: Assemble release manifest
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          import os
          from datetime import datetime, timezone
          from pathlib import Path

          images = {}
          for path in sorted(Path("manifest-fragments").glob("*.json")):
              item = json.loads(path.read_text())
              if set(item) != {"name", "repository", "tag", "digest"}:
                  raise SystemExit(f"invalid release fragment contract in {path}")
              if item["name"] in images:
                  raise SystemExit(f"duplicate release image fragment for {item['name']}")
              if not item["tag"].startswith("sha-") or len(item["tag"]) != 44:
                  raise SystemExit(f"mutable or invalid tag in {path}")
              if not item["digest"].startswith("sha256:"):
                  raise SystemExit(f"missing digest in {path}")
              images[item["name"]] = {
                  "repository": item["repository"],
                  "tag": item["tag"],
                  "digest": item["digest"],
              }
          expected = {
              "dashboard",
              "feed-ingestor",
              "fork-sandbox",
              "phoenix-engine",
              "recorder",
              "rpc-gateway",
          }
          if set(images) != expected:
              raise SystemExit("release manifest image set is incomplete or unexpected")
          manifest = {
              "schema": "phoenix.release.v1",
              "release_sha": os.environ["GITHUB_SHA"],
              "created_at": datetime.now(timezone.utc).replace(microsecond=0).isoformat().replace("+00:00", "Z"),
              "images": images,
          }
          Path("release-manifest.json").write_text(json.dumps(manifest, indent=2, sort_keys=True) + "\n")
          PY

      - name: Upload release manifest
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: phoenix-release-manifest-${{ github.sha }}
          path: release-manifest.json
          if-no-files-found: error
          retention-days: 90

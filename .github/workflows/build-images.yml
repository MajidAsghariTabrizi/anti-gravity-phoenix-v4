name: Build Phoenix Images

on:
  workflow_dispatch:
    inputs:
      release_sha:
        description: Exact lowercase 40-character commit SHA reachable from main
        required: true
        type: string
      release_intent:
        description: Bounded immutable release intent
        required: true
        type: choice
        options:
          - PHOENIX_PRELIVE_SHADOW_V5
      confirm_publish:
        description: Type PUBLISH_IMMUTABLE_PHOENIX_IMAGES
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ inputs.release_sha }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: majidasgharitabrizi

jobs:
  preflight:
    name: publication-preflight
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Checkout exact requested release
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ inputs.release_sha }}
          fetch-depth: 0

      - name: Validate explicit publication authorization
        shell: bash
        env:
          RELEASE_SHA: ${{ inputs.release_sha }}
          RELEASE_INTENT: ${{ inputs.release_intent }}
          CONFIRM_PUBLISH: ${{ inputs.confirm_publish }}
        run: |
          set -euo pipefail
          checked_out_sha="$(git rev-parse HEAD)"
          python3 scripts/release_provenance.py validate-dispatch \
            --release-sha "$RELEASE_SHA" \
            --release-intent "$RELEASE_INTENT" \
            --confirm-publish "$CONFIRM_PUBLISH" \
            --checked-out-sha "$checked_out_sha"
          git fetch --no-tags origin main
          if ! git merge-base --is-ancestor "$RELEASE_SHA" origin/main; then
            echo "Requested release SHA is not reachable from origin/main"
            exit 1
          fi

  build:
    name: build-${{ matrix.image }}
    needs: preflight
    runs-on: ubuntu-24.04
    timeout-minutes: 35
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: feed-ingestor
            dockerfile: deploy/feed-ingestor.Dockerfile
            build_args: ""
          - image: phoenix-engine
            dockerfile: deploy/rust.Dockerfile
            build_args: "CRATE=phoenix-engine"
          - image: rpc-gateway
            dockerfile: deploy/rust.Dockerfile
            build_args: "CRATE=rpc-gateway"
          - image: recorder
            dockerfile: deploy/rust.Dockerfile
            build_args: "CRATE=recorder"
          - image: fork-sandbox
            dockerfile: deploy/fork-sandbox.Dockerfile
            build_args: ""
          - image: dashboard
            dockerfile: deploy/dashboard.Dockerfile
            build_args: ""
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ inputs.release_sha }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f

      - name: Login to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Capture OCI created timestamp
        id: created
        shell: bash
        run: echo "value=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_OUTPUT"

      - name: Build and push immutable image
        id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          build-args: ${{ matrix.build_args }}
          tags: ghcr.io/majidasgharitabrizi/${{ matrix.image }}:sha-${{ inputs.release_sha }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ inputs.release_sha }}
            org.opencontainers.image.created=${{ steps.created.outputs.value }}
            org.opencontainers.image.title=${{ matrix.image }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}

      - name: Write image manifest fragment
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p manifest-fragments
          cat > "manifest-fragments/${{ matrix.image }}.json" <<EOF
          {
            "schema": "phoenix.release-fragment.v1",
            "release_sha": "${{ inputs.release_sha }}",
            "build_run_id": "${{ github.run_id }}",
            "release_intent": "${{ inputs.release_intent }}",
            "name": "${{ matrix.image }}",
            "repository": "ghcr.io/majidasgharitabrizi/${{ matrix.image }}",
            "tag": "sha-${{ inputs.release_sha }}",
            "digest": "${{ steps.build.outputs.digest }}"
          }
          EOF

      - name: Upload image manifest fragment
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: release-fragment-${{ matrix.image }}
          path: manifest-fragments/${{ matrix.image }}.json
          if-no-files-found: error
          retention-days: 30

  assets:
    name: release-assets
    needs: preflight
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ inputs.release_sha }}

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@b00af27efadbc7b4ca8b82abbd903b17cc874d2a
        with:
          version: stable

      - name: Build and verify immutable release assets
        shell: bash
        env:
          RELEASE_SHA: ${{ inputs.release_sha }}
        run: |
          set -euo pipefail
          forge build --root contracts
          python3 -m unittest scripts.tests.test_release_assets
          python3 scripts/release_assets.py build \
            --repo-root . \
            --release-sha "$RELEASE_SHA" \
            --contract-artifact contracts/out/PhoenixExecutor.sol/PhoenixExecutor.json \
            --output-dir release-assets
          python3 scripts/release_assets.py verify \
            --archive "release-assets/phoenix-release-assets-${RELEASE_SHA}.tar.gz" \
            --manifest release-assets/release-assets-manifest.json \
            --checksums release-assets/release-assets-checksums.txt \
            --expected-sha "$RELEASE_SHA"

      - name: Upload immutable release assets
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: phoenix-release-assets-${{ inputs.release_sha }}
          path: release-assets/
          if-no-files-found: error
          retention-days: 90

  manifest:
    name: release-manifest
    needs: [preflight, build, assets]
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout exact requested release
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ inputs.release_sha }}

      - name: Download image manifest fragments
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          pattern: release-fragment-*
          merge-multiple: true
          path: manifest-fragments

      - name: Download immutable release assets
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: phoenix-release-assets-${{ inputs.release_sha }}
          path: release-assets

      - name: Assemble same-run release manifest and provenance
        shell: bash
        env:
          RELEASE_SHA: ${{ inputs.release_sha }}
          RELEASE_INTENT: ${{ inputs.release_intent }}
          BUILD_RUN_ID: ${{ github.run_id }}
        run: |
          set -euo pipefail
          python3 scripts/release_assets.py verify \
            --archive "release-assets/phoenix-release-assets-${RELEASE_SHA}.tar.gz" \
            --manifest release-assets/release-assets-manifest.json \
            --checksums release-assets/release-assets-checksums.txt \
            --expected-sha "$RELEASE_SHA"
          python3 scripts/release_provenance.py assemble \
            --fragments-dir manifest-fragments \
            --release-assets-dir release-assets \
            --release-sha "$RELEASE_SHA" \
            --build-run-id "$BUILD_RUN_ID" \
            --release-intent "$RELEASE_INTENT" \
            --output-manifest release-manifest.json \
            --output-provenance release-provenance.json

      - name: Upload release manifest and provenance
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: phoenix-release-manifest-${{ inputs.release_sha }}
          path: |
            release-manifest.json
            release-provenance.json
          if-no-files-found: error
          retention-days: 90

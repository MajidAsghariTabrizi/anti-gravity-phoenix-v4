name: Build Phoenix Images

on:
  workflow_dispatch:
    inputs:
      release_sha:
        description: Exact lowercase 40-character commit SHA reachable from main
        required: true
        type: string
      release_intent:
        description: Bounded immutable release intent
        required: true
        type: choice
        options:
          - PHOENIX_PRELIVE_SHADOW_V5
      confirm_publish:
        description: Type PUBLISH_IMMUTABLE_PHOENIX_IMAGES
        required: true
        type: string
      ci_run_id:
        description: Exact successful Phoenix CI main-push run for release_sha
        required: true
        type: string
      ci_run_attempt:
        description: Exact successful Phoenix CI run attempt
        required: true
        type: string
      protected_base_sha:
        description: Optional exact release SHA supplying protected images
        required: false
        default: ""
        type: string
      protected_base_build_run_id:
        description: Optional successful Build Phoenix Images run for protected_base_sha
        required: false
        default: ""
        type: string

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ inputs.release_sha }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: majidasgharitabrizi

jobs:
  preflight:
    name: publication-preflight
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      contents: read
      actions: read
    outputs:
      build_matrix: ${{ steps.components.outputs.matrix }}
    steps:
      - name: Checkout exact requested release
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ inputs.release_sha }}
          fetch-depth: 0

      - name: Load canonical release component matrix
        id: components
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/release_components.py validate
          printf 'matrix=%s\n' "$(python3 scripts/release_components.py build-matrix)" \
            >> "$GITHUB_OUTPUT"

      - name: Validate explicit publication authorization
        shell: bash
        env:
          RELEASE_SHA: ${{ inputs.release_sha }}
          RELEASE_INTENT: ${{ inputs.release_intent }}
          CONFIRM_PUBLISH: ${{ inputs.confirm_publish }}
          CI_RUN_ID: ${{ inputs.ci_run_id }}
          CI_RUN_ATTEMPT: ${{ inputs.ci_run_attempt }}
          PROTECTED_BASE_SHA: ${{ inputs.protected_base_sha }}
          PROTECTED_BASE_BUILD_RUN_ID: ${{ inputs.protected_base_build_run_id }}
        run: |
          set -euo pipefail
          checked_out_sha="$(git rev-parse HEAD)"
          python3 scripts/release_provenance.py validate-dispatch \
            --release-sha "$RELEASE_SHA" \
            --release-intent "$RELEASE_INTENT" \
            --confirm-publish "$CONFIRM_PUBLISH" \
            --checked-out-sha "$checked_out_sha" \
            --ci-run-id "$CI_RUN_ID" \
            --ci-run-attempt "$CI_RUN_ATTEMPT" \
            --protected-base-sha "$PROTECTED_BASE_SHA" \
            --protected-base-build-run-id "$PROTECTED_BASE_BUILD_RUN_ID"
          git fetch --no-tags origin main
          if [ "$(git rev-parse origin/main)" != "$RELEASE_SHA" ]; then
            echo "Requested release SHA is not the exact origin/main tip"
            exit 1
          fi

      - name: Validate exact successful main-push CI evidence
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_SHA: ${{ inputs.release_sha }}
          CI_RUN_ID: ${{ inputs.ci_run_id }}
          CI_RUN_ATTEMPT: ${{ inputs.ci_run_attempt }}
        run: |
          set -euo pipefail
          mkdir -p source-ci
          gh api \
            "repos/${GITHUB_REPOSITORY}/actions/runs/${CI_RUN_ID}/attempts/${CI_RUN_ATTEMPT}" \
            > source-ci/run.json
          gh api \
            "repos/${GITHUB_REPOSITORY}/actions/runs/${CI_RUN_ID}/attempts/${CI_RUN_ATTEMPT}/jobs?per_page=100" \
            > source-ci/jobs.json
          python3 scripts/release_provenance.py validate-source-ci \
            --run-evidence source-ci/run.json \
            --jobs-evidence source-ci/jobs.json \
            --expected-sha "$RELEASE_SHA" \
            --expected-run-id "$CI_RUN_ID" \
            --expected-run-attempt "$CI_RUN_ATTEMPT" \
            --output source-ci/evidence.json

      - name: Upload validated source CI evidence
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: source-ci-evidence-${{ inputs.release_sha }}
          path: source-ci/evidence.json
          if-no-files-found: error
          retention-days: 90

      - name: Validate protected base build run
        if: ${{ inputs.protected_base_sha != '' }}
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PROTECTED_BASE_SHA: ${{ inputs.protected_base_sha }}
          PROTECTED_BASE_BUILD_RUN_ID: ${{ inputs.protected_base_build_run_id }}
        run: |
          set -euo pipefail
          mkdir -p protected-base
          gh api \
            "repos/${GITHUB_REPOSITORY}/actions/runs/${PROTECTED_BASE_BUILD_RUN_ID}" \
            > protected-base/build-run.json
          python3 scripts/release_provenance.py validate-github-run \
            --run-evidence protected-base/build-run.json \
            --expected-sha "$PROTECTED_BASE_SHA" \
            --expected-run-id "$PROTECTED_BASE_BUILD_RUN_ID"

      - name: Download exact protected base release manifest
        if: ${{ inputs.protected_base_sha != '' }}
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: phoenix-release-manifest-${{ inputs.protected_base_sha }}
          run-id: ${{ inputs.protected_base_build_run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: protected-base/release

      - name: Materialize inherited protected image fragments
        if: ${{ inputs.protected_base_sha != '' }}
        shell: bash
        env:
          RELEASE_SHA: ${{ inputs.release_sha }}
          RELEASE_INTENT: ${{ inputs.release_intent }}
          BUILD_RUN_ID: ${{ github.run_id }}
          PROTECTED_BASE_SHA: ${{ inputs.protected_base_sha }}
          PROTECTED_BASE_BUILD_RUN_ID: ${{ inputs.protected_base_build_run_id }}
        run: |
          set -euo pipefail
          python3 scripts/release_provenance.py inherit-protected \
            --output-dir inherited-fragments \
            --release-sha "$RELEASE_SHA" \
            --build-run-id "$BUILD_RUN_ID" \
            --release-intent "$RELEASE_INTENT" \
            --protected-base-sha "$PROTECTED_BASE_SHA" \
            --protected-base-build-run-id "$PROTECTED_BASE_BUILD_RUN_ID" \
            --protected-base-manifest protected-base/release/release-manifest.json \
            --protected-base-provenance protected-base/release/release-provenance.json

      - name: Upload inherited protected image fragments
        if: ${{ inputs.protected_base_sha != '' }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: inherited-protected-fragments
          path: inherited-fragments/
          if-no-files-found: error
          retention-days: 30

  build:
    name: build-${{ matrix.image }}
    needs: preflight
    runs-on: ubuntu-24.04
    timeout-minutes: 35
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.preflight.outputs.build_matrix) }}
    steps:
      - name: Use inherited protected image
        if: ${{ inputs.protected_base_sha != '' && matrix.protected == true }}
        shell: bash
        run: printf 'Protected image %s is inherited from the reviewed base release.\n' '${{ matrix.image }}'

      - name: Download inherited protected image fragments
        if: ${{ inputs.protected_base_sha != '' && matrix.protected == true }}
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: inherited-protected-fragments
          path: inherited-fragments

      - name: Upload inherited image manifest fragment
        if: ${{ inputs.protected_base_sha != '' && matrix.protected == true }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: release-fragment-${{ matrix.image }}
          path: inherited-fragments/${{ matrix.image }}.json
          if-no-files-found: error
          retention-days: 30

      - name: Checkout
        if: ${{ inputs.protected_base_sha == '' || matrix.protected == false }}
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ inputs.release_sha }}

      - name: Setup Docker Buildx
        if: ${{ inputs.protected_base_sha == '' || matrix.protected == false }}
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f

      - name: Login to GHCR
        if: ${{ inputs.protected_base_sha == '' || matrix.protected == false }}
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Capture OCI created timestamp
        if: ${{ inputs.protected_base_sha == '' || matrix.protected == false }}
        id: created
        shell: bash
        run: echo "value=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_OUTPUT"

      - name: Build and push immutable image
        if: ${{ inputs.protected_base_sha == '' || matrix.protected == false }}
        id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          build-args: ${{ matrix.build_args }}
          tags: ${{ matrix.repository }}:sha-${{ inputs.release_sha }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ inputs.release_sha }}
            org.opencontainers.image.created=${{ steps.created.outputs.value }}
            org.opencontainers.image.title=${{ matrix.image }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}

      - name: Write image manifest fragment
        if: ${{ inputs.protected_base_sha == '' || matrix.protected == false }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p manifest-fragments
          cat > "manifest-fragments/${{ matrix.image }}.json" <<EOF
          {
            "schema": "phoenix.release-fragment.v1",
            "release_sha": "${{ inputs.release_sha }}",
            "build_run_id": "${{ github.run_id }}",
            "release_intent": "${{ inputs.release_intent }}",
            "name": "${{ matrix.image }}",
            "repository": "${{ matrix.repository }}",
            "tag": "sha-${{ inputs.release_sha }}",
            "digest": "${{ steps.build.outputs.digest }}"
          }
          EOF

      - name: Upload image manifest fragment
        if: ${{ inputs.protected_base_sha == '' || matrix.protected == false }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: release-fragment-${{ matrix.image }}
          path: manifest-fragments/${{ matrix.image }}.json
          if-no-files-found: error
          retention-days: 30

  assets:
    name: release-assets
    needs: preflight
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ inputs.release_sha }}

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@b00af27efadbc7b4ca8b82abbd903b17cc874d2a
        with:
          version: stable

      - name: Build and verify immutable release assets
        shell: bash
        env:
          RELEASE_SHA: ${{ inputs.release_sha }}
        run: |
          set -euo pipefail
          forge build --root contracts
          python3 -m unittest scripts.tests.test_release_assets
          python3 scripts/release_assets.py build \
            --repo-root . \
            --release-sha "$RELEASE_SHA" \
            --contract-artifact contracts/out/PhoenixExecutor.sol/PhoenixExecutor.json \
            --output-dir release-assets
          python3 scripts/release_assets.py verify \
            --archive "release-assets/phoenix-release-assets-${RELEASE_SHA}.tar.gz" \
            --manifest release-assets/release-assets-manifest.json \
            --checksums release-assets/release-assets-checksums.txt \
            --expected-sha "$RELEASE_SHA"

      - name: Upload immutable release assets
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: phoenix-release-assets-${{ inputs.release_sha }}
          path: release-assets/
          if-no-files-found: error
          retention-days: 90

  manifest:
    name: release-manifest
    needs: [preflight, build, assets]
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
      actions: read
    steps:
      - name: Checkout exact requested release
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ inputs.release_sha }}

      - name: Download image manifest fragments
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          pattern: release-fragment-*
          merge-multiple: true
          path: manifest-fragments

      - name: Download immutable release assets
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: phoenix-release-assets-${{ inputs.release_sha }}
          path: release-assets

      - name: Download validated source CI evidence
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: source-ci-evidence-${{ inputs.release_sha }}
          path: source-ci

      - name: Download exact protected base release manifest
        if: ${{ inputs.protected_base_sha != '' }}
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: phoenix-release-manifest-${{ inputs.protected_base_sha }}
          run-id: ${{ inputs.protected_base_build_run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: protected-base

      - name: Assemble same-run release manifest and provenance
        shell: bash
        env:
          RELEASE_SHA: ${{ inputs.release_sha }}
          RELEASE_INTENT: ${{ inputs.release_intent }}
          BUILD_RUN_ID: ${{ github.run_id }}
          PROTECTED_BASE_SHA: ${{ inputs.protected_base_sha }}
          PROTECTED_BASE_BUILD_RUN_ID: ${{ inputs.protected_base_build_run_id }}
        run: |
          set -euo pipefail
          python3 scripts/release_assets.py verify \
            --archive "release-assets/phoenix-release-assets-${RELEASE_SHA}.tar.gz" \
            --manifest release-assets/release-assets-manifest.json \
            --checksums release-assets/release-assets-checksums.txt \
            --expected-sha "$RELEASE_SHA"
          protected_args=()
          if [ -n "$PROTECTED_BASE_SHA" ]; then
            protected_args=(
              --protected-base-sha "$PROTECTED_BASE_SHA"
              --protected-base-build-run-id "$PROTECTED_BASE_BUILD_RUN_ID"
              --protected-base-manifest protected-base/release-manifest.json
              --protected-base-provenance protected-base/release-provenance.json
            )
          fi
          python3 scripts/release_provenance.py assemble \
            --fragments-dir manifest-fragments \
            --release-assets-dir release-assets \
            --release-sha "$RELEASE_SHA" \
            --build-run-id "$BUILD_RUN_ID" \
            --release-intent "$RELEASE_INTENT" \
            --output-manifest release-manifest.json \
            --output-provenance release-provenance.json \
            --source-ci-evidence source-ci/evidence.json \
            "${protected_args[@]}"

      - name: Upload release manifest and provenance
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: phoenix-release-manifest-${{ inputs.release_sha }}
          path: |
            release-manifest.json
            release-provenance.json
          if-no-files-found: error
          retention-days: 90

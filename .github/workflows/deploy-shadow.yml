name: Deploy Shadow Production

on:
  workflow_run:
    workflows: ["Build Phoenix Images"]
    types: [completed]
    branches: [main]

permissions:
  contents: read
  actions: read

concurrency:
  group: production-shadow
  cancel-in-progress: false

jobs:
  deploy-shadow:
    name: deploy-shadow
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Download release manifest
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: phoenix-release-manifest-${{ github.event.workflow_run.head_sha }}
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: release

      - name: Validate manifest SHA
        shell: bash
        env:
          RELEASE_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path
          manifest = json.loads(Path("release/release-manifest.json").read_text())
          expected = os.environ["RELEASE_SHA"]
          if manifest.get("release_sha") != expected:
              raise SystemExit("release manifest SHA does not match workflow_run head SHA")
          for image in manifest.get("images", {}).values():
              if image.get("tag") != f"sha-{expected}":
                  raise SystemExit("release manifest image tag does not match exact SHA")
              if not image.get("digest", "").startswith("sha256:"):
                  raise SystemExit("release manifest image digest is missing")
          PY

      - name: Install SSH material
        shell: bash
        env:
          PROD_SSH_PRIVATE_KEY: ${{ secrets.PROD_SSH_PRIVATE_KEY }}
          PROD_KNOWN_HOSTS: ${{ secrets.PROD_KNOWN_HOSTS }}
        run: |
          set -euo pipefail
          install -d -m 700 "$HOME/.ssh"
          printf '%s\n' "$PROD_SSH_PRIVATE_KEY" > "$HOME/.ssh/id_ed25519"
          chmod 600 "$HOME/.ssh/id_ed25519"
          printf '%s\n' "$PROD_KNOWN_HOSTS" > "$HOME/.ssh/known_hosts"
          chmod 600 "$HOME/.ssh/known_hosts"

      - name: Deploy exact SHADOW release
        shell: bash
        env:
          PROD_HOST: ${{ secrets.PROD_HOST }}
          PROD_PORT: ${{ secrets.PROD_PORT }}
          PROD_USER: ${{ secrets.PROD_USER }}
          RELEASE_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          set -euo pipefail
          case "$RELEASE_SHA" in
            *[!0-9a-f]*|"") echo "invalid release SHA"; exit 1 ;;
          esac
          if [ "${#RELEASE_SHA}" -ne 40 ]; then
            echo "release SHA must be 40 lowercase hex characters"
            exit 1
          fi
          port="${PROD_PORT:-22}"
          remote="${PROD_USER}@${PROD_HOST}"
          ssh_opts=(-i "$HOME/.ssh/id_ed25519" -p "$port" -o UserKnownHostsFile="$HOME/.ssh/known_hosts" -o StrictHostKeyChecking=yes -o IdentitiesOnly=yes)
          ssh "${ssh_opts[@]}" "$remote" "install -d -m 0750 /opt/phoenix/deploy/manifests"
          scp -i "$HOME/.ssh/id_ed25519" -P "$port" -o UserKnownHostsFile="$HOME/.ssh/known_hosts" -o StrictHostKeyChecking=yes -o IdentitiesOnly=yes release/release-manifest.json "$remote:/opt/phoenix/deploy/manifests/${RELEASE_SHA}.json"
          ssh "${ssh_opts[@]}" "$remote" "/opt/phoenix/deploy/deploy-release.sh ${RELEASE_SHA}"

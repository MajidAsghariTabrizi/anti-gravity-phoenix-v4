name: Deploy Shadow Production

on:
  workflow_dispatch:
    inputs:
      release_sha:
        description: Exact current main SHA to deploy
        required: true
        type: string
      build_run_id:
        description: Successful Build Phoenix Images run for release_sha
        required: true
        type: string
      rollback_sha:
        description: Exact currently active SHA prepared for rollback
        required: true
        type: string
      rollback_build_run_id:
        description: Successful Build Phoenix Images run for rollback_sha
        required: true
        type: string
      acknowledgement:
        description: Type DEPLOY_PRELIVE_SHADOW
        required: true
        type: string

permissions:
  contents: read
  actions: read

concurrency:
  group: production-shadow
  cancel-in-progress: false

jobs:
  deploy-shadow:
    name: deploy-shadow
    runs-on: ubuntu-24.04
    timeout-minutes: 50
    environment: production-shadow
    steps:
      - name: Validate deployment request shape
        shell: bash
        env:
          RELEASE_SHA: ${{ inputs.release_sha }}
          BUILD_RUN_ID: ${{ inputs.build_run_id }}
          ROLLBACK_SHA: ${{ inputs.rollback_sha }}
          ROLLBACK_BUILD_RUN_ID: ${{ inputs.rollback_build_run_id }}
          ACKNOWLEDGEMENT: ${{ inputs.acknowledgement }}
        run: |
          set -euo pipefail
          for value in "$RELEASE_SHA" "$ROLLBACK_SHA"; do
            case "$value" in
              *[!0-9a-f]*|"") echo "release inputs must be lowercase hexadecimal"; exit 1 ;;
            esac
            [ "${#value}" -eq 40 ] || { echo "release inputs must be 40 characters"; exit 1; }
          done
          [ "$RELEASE_SHA" != "$ROLLBACK_SHA" ] || { echo "rollback SHA must differ from release SHA"; exit 1; }
          case "$BUILD_RUN_ID:$ROLLBACK_BUILD_RUN_ID" in
            *[!0-9:]*|:*|*:|*::* ) echo "build run IDs must be decimal integers"; exit 1 ;;
          esac
          [ "$ACKNOWLEDGEMENT" = DEPLOY_PRELIVE_SHADOW ] || { echo "deployment acknowledgement is invalid"; exit 1; }

      - name: Checkout exact release
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262
        with:
          ref: ${{ inputs.release_sha }}
          fetch-depth: 1
          persist-credentials: false

      - name: Verify release is current main
        shell: bash
        env:
          RELEASE_SHA: ${{ inputs.release_sha }}
        run: |
          set -euo pipefail
          [ "$(git rev-parse HEAD)" = "$RELEASE_SHA" ] || { echo "checkout does not match release SHA"; exit 1; }
          git fetch --no-tags --depth=1 origin main
          [ "$(git rev-parse FETCH_HEAD)" = "$RELEASE_SHA" ] || { echo "release SHA is not current main"; exit 1; }

      - name: Verify successful build run identities
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_SHA: ${{ inputs.release_sha }}
          BUILD_RUN_ID: ${{ inputs.build_run_id }}
          ROLLBACK_SHA: ${{ inputs.rollback_sha }}
          ROLLBACK_BUILD_RUN_ID: ${{ inputs.rollback_build_run_id }}
        run: |
          set -euo pipefail
          mkdir -p build-runs
          gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${BUILD_RUN_ID}" \
            > build-runs/release.json
          gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${ROLLBACK_BUILD_RUN_ID}" \
            > build-runs/rollback.json
          python3 scripts/release_provenance.py validate-github-run \
            --run-evidence build-runs/release.json \
            --expected-sha "$RELEASE_SHA" \
            --expected-run-id "$BUILD_RUN_ID"
          python3 scripts/release_provenance.py validate-github-run \
            --run-evidence build-runs/rollback.json \
            --expected-sha "$ROLLBACK_SHA" \
            --expected-run-id "$ROLLBACK_BUILD_RUN_ID"

      - name: Download release manifest
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: phoenix-release-manifest-${{ inputs.release_sha }}
          run-id: ${{ inputs.build_run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: release

      - name: Download release assets
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: phoenix-release-assets-${{ inputs.release_sha }}
          run-id: ${{ inputs.build_run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: release-assets

      - name: Download rollback manifest
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: phoenix-release-manifest-${{ inputs.rollback_sha }}
          run-id: ${{ inputs.rollback_build_run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: rollback

      - name: Validate immutable release and rollback evidence
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_SHA: ${{ inputs.release_sha }}
          BUILD_RUN_ID: ${{ inputs.build_run_id }}
          ROLLBACK_SHA: ${{ inputs.rollback_sha }}
          ROLLBACK_BUILD_RUN_ID: ${{ inputs.rollback_build_run_id }}
        run: |
          set -euo pipefail
          source_ci_run_id="$(jq -er '.source_ci.run_id' release/release-provenance.json)"
          source_ci_run_attempt="$(jq -er '.source_ci.run_attempt' release/release-provenance.json)"
          mkdir -p source-ci
          gh api \
            "repos/${GITHUB_REPOSITORY}/actions/runs/${source_ci_run_id}/attempts/${source_ci_run_attempt}" \
            > source-ci/run.json
          gh api \
            "repos/${GITHUB_REPOSITORY}/actions/runs/${source_ci_run_id}/attempts/${source_ci_run_attempt}/jobs?per_page=100" \
            > source-ci/jobs.json
          python3 scripts/release_provenance.py validate-source-ci-api \
            --release-provenance release/release-provenance.json \
            --run-evidence source-ci/run.json \
            --jobs-evidence source-ci/jobs.json \
            --expected-sha "$RELEASE_SHA"
          python3 scripts/release_assets.py verify \
            --archive "release-assets/phoenix-release-assets-${RELEASE_SHA}.tar.gz" \
            --manifest release-assets/release-assets-manifest.json \
            --checksums release-assets/release-assets-checksums.txt \
            --expected-sha "$RELEASE_SHA"
          python3 scripts/release_provenance.py validate-deploy-pair \
            --release-manifest release/release-manifest.json \
            --release-provenance release/release-provenance.json \
            --release-sha "$RELEASE_SHA" \
            --build-run-id "$BUILD_RUN_ID" \
            --rollback-manifest rollback/release-manifest.json \
            --rollback-provenance rollback/release-provenance.json \
            --rollback-sha "$ROLLBACK_SHA" \
            --rollback-build-run-id "$ROLLBACK_BUILD_RUN_ID"

      - name: Install SSH material
        shell: bash
        env:
          PROD_SSH_PRIVATE_KEY: ${{ secrets.PROD_SSH_PRIVATE_KEY }}
          PROD_KNOWN_HOSTS: ${{ secrets.PROD_KNOWN_HOSTS }}
        run: |
          set -euo pipefail
          [ -n "$PROD_SSH_PRIVATE_KEY" ] || { echo "production SSH key is not configured"; exit 1; }
          [ -n "$PROD_KNOWN_HOSTS" ] || { echo "production known-hosts data is not configured"; exit 1; }
          install -d -m 700 "$HOME/.ssh"
          printf '%s\n' "$PROD_SSH_PRIVATE_KEY" > "$HOME/.ssh/id_ed25519"
          chmod 600 "$HOME/.ssh/id_ed25519"
          printf '%s\n' "$PROD_KNOWN_HOSTS" > "$HOME/.ssh/known_hosts"
          chmod 600 "$HOME/.ssh/known_hosts"

      - name: Deploy exact SHADOW release
        shell: bash
        env:
          PROD_HOST: ${{ secrets.PROD_HOST }}
          PROD_PORT: ${{ secrets.PROD_PORT }}
          PROD_USER: ${{ secrets.PROD_USER }}
          RELEASE_SHA: ${{ inputs.release_sha }}
          BUILD_RUN_ID: ${{ inputs.build_run_id }}
          ROLLBACK_SHA: ${{ inputs.rollback_sha }}
          ROLLBACK_BUILD_RUN_ID: ${{ inputs.rollback_build_run_id }}
        run: |
          set -euo pipefail
          printf '%s' "$PROD_HOST" | grep -Eq '^[A-Za-z0-9._-]+$' || { echo "production host is invalid"; exit 1; }
          [ "$PROD_USER" = phoenix ] || { echo "production user must be phoenix"; exit 1; }
          port="${PROD_PORT:-22}"
          case "$port" in *[!0-9]*|"") echo "production port is invalid"; exit 1 ;; esac
          [ "$port" -ge 1 ] && [ "$port" -le 65535 ] || { echo "production port is invalid"; exit 1; }
          remote="${PROD_USER}@${PROD_HOST}"
          ssh_opts=(-i "$HOME/.ssh/id_ed25519" -p "$port" -o UserKnownHostsFile="$HOME/.ssh/known_hosts" -o StrictHostKeyChecking=yes -o IdentitiesOnly=yes)
          scp_opts=(-i "$HOME/.ssh/id_ed25519" -P "$port" -o UserKnownHostsFile="$HOME/.ssh/known_hosts" -o StrictHostKeyChecking=yes -o IdentitiesOnly=yes)
          remote_stage="/tmp/phoenix-shadow-deploy-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-${RELEASE_SHA}"
          ssh "${ssh_opts[@]}" "$remote" \
            "set -eu; umask 077; [ ! -e '$remote_stage' ]; install -d -m 0700 '$remote_stage'"
          scp "${scp_opts[@]}" release/release-manifest.json "$remote:$remote_stage/release-manifest.json"
          scp "${scp_opts[@]}" release/release-provenance.json "$remote:$remote_stage/release-provenance.json"
          scp "${scp_opts[@]}" rollback/release-manifest.json "$remote:$remote_stage/rollback-manifest.json"
          scp "${scp_opts[@]}" rollback/release-provenance.json "$remote:$remote_stage/rollback-provenance.json"
          scp "${scp_opts[@]}" \
            release-assets/release-assets-manifest.json \
            release-assets/release-assets-checksums.txt \
            "release-assets/phoenix-release-assets-${RELEASE_SHA}.tar.gz" \
            "$remote:$remote_stage/"
          ssh "${ssh_opts[@]}" "$remote" "chmod 0600 '$remote_stage'/*"

          gateway=/usr/local/sbin/phoenix-shadow-deploy-gateway
          gateway_args=(
            "$RELEASE_SHA"
            "$ROLLBACK_SHA"
            "$BUILD_RUN_ID"
            "$ROLLBACK_BUILD_RUN_ID"
            "$GITHUB_RUN_ID"
            "$GITHUB_RUN_ATTEMPT"
          )
          gateway_remote() {
            ssh "${ssh_opts[@]}" "$remote" sudo -n "$gateway" "$@"
          }
          set +e
          start_output=$(gateway_remote start "${gateway_args[@]}" 2>&1)
          start_code=$?
          set -e
          printf '%s\n' "$start_output"
          if [ "$start_code" -ne 0 ]; then
            gateway_remote evidence "${gateway_args[@]}" \
              >shadow-deploy-evidence.json || true
            cat shadow-deploy-evidence.json
            exit 1
          fi

          deadline=$((SECONDS + 2450))
          status_code=3
          while [ "$SECONDS" -lt "$deadline" ]; do
            set +e
            status_output=$(gateway_remote status "${gateway_args[@]}" 2>&1)
            status_code=$?
            set -e
            printf '%s\n' "$status_output"
            case "$status_code" in
              0) break ;;
              3) sleep 10 ;;
              1)
                gateway_remote evidence "${gateway_args[@]}" \
                  >shadow-deploy-evidence.json || true
                cat shadow-deploy-evidence.json
                exit 1
                ;;
              *) echo 'deployment gateway status failed'; exit 1 ;;
            esac
          done
          [ "$status_code" -eq 0 ] || {
            gateway_remote evidence "${gateway_args[@]}" \
              >shadow-deploy-evidence.json || true
            cat shadow-deploy-evidence.json
            echo 'deployment gateway timed out'
            exit 1
          }
          gateway_remote evidence "${gateway_args[@]}" \
            >shadow-deploy-evidence.json
          cat shadow-deploy-evidence.json
          gateway_remote cleanup "${gateway_args[@]}"

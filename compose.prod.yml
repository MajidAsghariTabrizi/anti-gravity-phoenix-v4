x-common-env: &common-env
  env_file:
    - ${PHOENIX_ENV_FILE:-/etc/phoenix/phoenix.env}

x-logging: &bounded-logging
  driver: json-file
  options:
    max-size: "50m"
    max-file: "5"

services:
  nitro-feed-relay:
    image: offchainlabs/nitro-node@sha256:ebc985e3b105980734630744981e1542001c22d74cba57509fe0d5ed8bb84c14
    entrypoint: ["relay"]
    command:
      - --chain.id=42161
      - --node.feed.input.url=${ARBITRUM_SEQUENCER_FEED_URL:?ARBITRUM_SEQUENCER_FEED_URL is required}
      - --node.feed.output.enable=true
      - --node.feed.output.addr=0.0.0.0
      - --node.feed.output.port=9642
    networks: [phoenix-internal]
    restart: unless-stopped
    logging: *bounded-logging
    healthcheck:
      test: ["CMD-SHELL", "grep -Eq ':25AA[[:space:]].*[[:space:]]0A[[:space:]]' /proc/net/tcp /proc/net/tcp6"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  nats:
    image: nats@sha256:b83efabe3e7def1e0a4a31ec6e078999bb17c80363f881df35edc70fcb6bb927
    command: ["-c", "/etc/nats/nats-server.conf"]
    environment:
      GOMEMLIMIT: 512MiB
    volumes:
      - /opt/phoenix/deploy/nats-server.conf:/etc/nats/nats-server.conf:ro
      - nats-jetstream:/data/jetstream
    networks: [phoenix-internal]
    restart: unless-stopped
    logging: *bounded-logging
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:8222/healthz?js-enabled-only=true"]
      interval: 10s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres@sha256:57c72fd2a128e416c7fcc499958864df5301e940bca0a56f58fddf30ffc07777
    <<: *common-env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
    volumes:
      - /opt/phoenix/data/postgres:/var/lib/postgresql/data
    networks: [phoenix-internal]
    restart: unless-stopped
    logging: *bounded-logging
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 3s
      retries: 10

  migration-runner:
    image: ${FEED_INGESTOR_IMAGE:?FEED_INGESTOR_IMAGE is required}
    <<: *common-env
    entrypoint: ["/usr/local/bin/migration-runner"]
    command: ["-migrations", "/app/migrations"]
    depends_on:
      postgres:
        condition: service_healthy
    networks: [phoenix-internal]
    restart: "no"
    logging: *bounded-logging

  rpc-gateway:
    image: ${RPC_GATEWAY_IMAGE:?RPC_GATEWAY_IMAGE is required}
    <<: *common-env
    environment:
      PHOENIX_ENV: production
      RPC_GATEWAY_ADDR: 0.0.0.0:9300
      RPC_PROVIDER_URLS: ${RPC_PROVIDER_URLS:?RPC_PROVIDER_URLS is required}
      RPC_PROVIDER_WEIGHTS: ${RPC_PROVIDER_WEIGHTS:-1}
      RPC_UPSTREAM_CALLS_PER_SECOND: ${RPC_UPSTREAM_CALLS_PER_SECOND:-1}
      RPC_UPSTREAM_CALL_BURST: ${RPC_UPSTREAM_CALL_BURST:-4}
      RPC_STATE_REQUESTS_PER_MINUTE: ${RPC_STATE_REQUESTS_PER_MINUTE:-12}
      RPC_PROVIDER_PROBE_INTERVAL_SECONDS: ${RPC_PROVIDER_PROBE_INTERVAL_SECONDS:-60}
    networks: [phoenix-internal]
    restart: unless-stopped
    logging: *bounded-logging
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:9300/readyz >/dev/null 2>&1"]
      interval: 15s
      timeout: 3s
      retries: 5

  feed-ingestor:
    image: ${FEED_INGESTOR_IMAGE:?FEED_INGESTOR_IMAGE is required}
    <<: *common-env
    environment:
      PHOENIX_ENV: production
      PHOENIX_FEED_SOURCE: relay
      PHOENIX_FEED_RELAY_URL: ${PHOENIX_FEED_RELAY_URL:?PHOENIX_FEED_RELAY_URL is required}
      PHOENIX_FEED_FIXTURE: ""
      NATS_URL: nats://nats:4222
      METRICS_ADDR: 0.0.0.0:9100
    depends_on:
      nats:
        condition: service_healthy
      nitro-feed-relay:
        condition: service_healthy
    networks: [phoenix-internal]
    restart: unless-stopped
    logging: *bounded-logging
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:9100/readyz >/dev/null 2>&1"]
      interval: 10s
      timeout: 3s
      retries: 5

  phoenix-engine:
    image: ${PHOENIX_ENGINE_IMAGE:?PHOENIX_ENGINE_IMAGE is required}
    <<: *common-env
    environment:
      PHOENIX_ENV: production
      PHOENIX_MODE: SHADOW
      LIVE_EXECUTION: "false"
      SIGNER_PRIVATE_KEY: ""
      EXECUTOR_ADDRESS: ""
      WALLET_ADDRESS: ""
      NATS_URL: nats://nats:4222
      POSTGRES_DSN: ${POSTGRES_DSN:?POSTGRES_DSN is required}
      PGSSLMODE: ${PGSSLMODE:-prefer}
      RPC_GATEWAY_URL: http://rpc-gateway:9300
      ENGINE_ROUTER_ADDRESSES: ${ENGINE_ROUTER_ADDRESSES:-0xe592427a0aece92de3edee1f18e0157c05861564,0x68b3465833fb72a70ecdf485e0e4c7bd8665fc45,0xa51afafe0263b40edaef0df8781ea9aa03e381a3}
      ENGINE_ROUTE_REGISTRY_JSON: |-
        ${ENGINE_ROUTE_REGISTRY_JSON:-[]}
      CHAIN_ID: 42161
      ENGINE_HEALTH_ADDR: 0.0.0.0:9200
    depends_on:
      migration-runner:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
      rpc-gateway:
        condition: service_healthy
      shadow-dispatcher:
        condition: service_healthy
      feed-ingestor:
        condition: service_healthy
    networks: [phoenix-internal]
    restart: unless-stopped
    logging: *bounded-logging
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:9200/readyz >/dev/null 2>&1"]
      interval: 15s
      timeout: 3s
      retries: 5

  shadow-dispatcher:
    image: ${RECORDER_IMAGE:?RECORDER_IMAGE is required}
    <<: *common-env
    entrypoint: ["/usr/local/bin/shadow-dispatcher"]
    environment:
      PHOENIX_ENV: production
      PHOENIX_MODE: SHADOW
      LIVE_EXECUTION: "false"
      SIGNER_PRIVATE_KEY: ""
      EXECUTOR_ADDRESS: ""
      WALLET_ADDRESS: ""
      POSTGRES_DSN: ${POSTGRES_DSN:?POSTGRES_DSN is required}
      PGSSLMODE: ${PGSSLMODE:-prefer}
      NATS_URL: nats://nats:4222
      SHADOW_DISPATCHER_HEALTH_ADDR: 0.0.0.0:9500
      SHADOW_DISPATCHER_BATCH_SIZE: ${SHADOW_DISPATCHER_BATCH_SIZE:-64}
      SHADOW_DISPATCHER_LEASE_SECONDS: ${SHADOW_DISPATCHER_LEASE_SECONDS:-30}
      SHADOW_DISPATCHER_BACKLOG_REFRESH_SECONDS: ${SHADOW_DISPATCHER_BACKLOG_REFRESH_SECONDS:-60}
    depends_on:
      migration-runner:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
    networks: [phoenix-internal]
    restart: unless-stopped
    logging: *bounded-logging
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:9500/readyz >/dev/null 2>&1"]
      interval: 15s
      timeout: 3s
      retries: 5

  recorder:
    image: ${RECORDER_IMAGE:?RECORDER_IMAGE is required}
    <<: *common-env
    environment:
      PHOENIX_ENV: production
      PHOENIX_MODE: SHADOW
      LIVE_EXECUTION: "false"
      SIGNER_PRIVATE_KEY: ""
      EXECUTOR_ADDRESS: ""
      WALLET_ADDRESS: ""
      RECORDER_DAEMON: "true"
      RECORDER_PERSISTENCE_POLICY: money_path_v1
      RECORDER_HEALTH_ADDR: 0.0.0.0:9400
      POSTGRES_DSN: ${POSTGRES_DSN:?POSTGRES_DSN is required}
      PGSSLMODE: ${PGSSLMODE:-prefer}
      NATS_URL: nats://nats:4222
      RECORDER_BATCH_MAX_SIZE: ${RECORDER_BATCH_MAX_SIZE:-256}
      RECORDER_BATCH_MAX_WAIT_MS: ${RECORDER_BATCH_MAX_WAIT_MS:-100}
      RECORDER_AGGREGATE_FLUSH_SECONDS: ${RECORDER_AGGREGATE_FLUSH_SECONDS:-60}
      RECORDER_AGGREGATE_FLUSH_EVENTS: ${RECORDER_AGGREGATE_FLUSH_EVENTS:-10000}
      RECORDER_MAX_SAMPLES_PER_DETAIL_PER_DAY: ${RECORDER_MAX_SAMPLES_PER_DETAIL_PER_DAY:-100}
      RECORDER_MAX_SAMPLE_JSON_BYTES: ${RECORDER_MAX_SAMPLE_JSON_BYTES:-1024}
      ENGINE_ROUTER_ADDRESSES: ${ENGINE_ROUTER_ADDRESSES:-0xe592427a0aece92de3edee1f18e0157c05861564,0x68b3465833fb72a70ecdf485e0e4c7bd8665fc45,0xa51afafe0263b40edaef0df8781ea9aa03e381a3}
      ENGINE_ROUTE_REGISTRY_JSON: |-
        ${ENGINE_ROUTE_REGISTRY_JSON:-[]}
    depends_on:
      migration-runner:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
    networks: [phoenix-internal]
    restart: unless-stopped
    logging: *bounded-logging
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:9400/readyz >/dev/null 2>&1"]
      interval: 15s
      timeout: 3s
      retries: 5

  dashboard:
    image: ${DASHBOARD_IMAGE:?DASHBOARD_IMAGE is required}
    volumes:
      - /opt/phoenix/evidence/dashboard:/evidence:ro
    ports:
      - "127.0.0.1:8501:8501"
    networks: [phoenix-internal]
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777,noexec,nosuid,nodev
    cap_drop: [ALL]
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    logging: *bounded-logging
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8501/_stcore/health', timeout=2)\""]
      interval: 15s
      timeout: 3s
      retries: 5

  prometheus:
    image: prom/prometheus@sha256:075b1ba2c4ebb04bc3a6ab86c06ec8d8099f8fda1c96ef6d104d9bb1def1d8bc
    user: "65534:65534"
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=30d
    volumes:
      - /opt/phoenix/deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - /opt/phoenix/data/prometheus:/prometheus
    ports:
      - "127.0.0.1:9090:9090"
    networks: [phoenix-internal]
    restart: unless-stopped
    logging: *bounded-logging
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:9090/-/ready >/dev/null 2>&1"]
      interval: 15s
      timeout: 3s
      retries: 5

networks:
  phoenix-internal:
    driver: bridge

volumes:
  nats-jetstream:
    name: phoenix-nats-jetstream
